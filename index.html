<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API part</title>
    <!--tailwind & daisy ul-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style.css">

</head>
<body>
 <nav class="flex justify-between items-center px-8 py-4 bg-base-200">
    <div class="flex items-center gap-3">
        <img class="w-8" src="assets/github-logo.png" alt="">
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
    </div>
    <div class="flex items-center gap-3 ">
        <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>

 <button class="btn btn-primary">new issues</button>
    </div>
   
 </nav>
 <main class="w-10/12 mx-auto my-6">
    <div class="flex gap-5 bg-base-200">
        <button id="all-btn" class="btn btn-primary px-5">All</button> 
        <button id="open-btn" class="btn btn-primary px-5">Open</button> 
        <button id="closed-btn" class="btn btn-primary px-5">Closed</button> 
    </div>
  <div class="flex justify-between bg-base-200 my-6">
      <div class="flex my-6">
        <div> <img src="assets/Aperture.png" alt=""></div>
        <div>
            <h2><span id="cardCount">50</span> Issues</h2>
            <p>Track and manage your project issues</p>
        </div>
    </div>
    <div class="flex my-6">
        <p class="flex"><span><img src="assets/Open-Status.png" alt=""></span> Open</p>
        <p class="flex"><span><img src="assets/Closed- Status .png" alt=""></span> Closed</p>
    </div>
  </div>
    <div id="issuesContainer" class="grid grid-cols-1  sm:grid-cols-4 space-y-4 ">

        <!--api will dynamically loaded here by js-->

    </div>
    <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
  
<span class="loading loading-dots loading-xl"></span>
</div>

<!-- Open the modal using ID.showModal() method -->
<button class="btn" onclick="my_modal_1.showModal()">open modal</button>
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">


   <div class="flex justify-between">
          <img src="assets/Open-Status.png" alt="">
          <h2 class="bg-red-400 border-amber-50 rounded-2xl px-3" id="issue-priority"></h2>
        </div>
        <div>
          <h2 class="text-2xl font-bold" id="issue-title"></h2>
          <p class="line-clamp-2" id="issue-description"></p>
        </div>
        <div class="flex justify-around">
          <h2 class="text-xl font-bold bg-red-300 rounded-2xl px-3">BUG</h2>
          <h2 class="text-xl font-bold  bg-red-300 rounded-2xl px-3"> Help Wanted</h2>
        </div>
        <div class="px-2 py-2 bg-base-200 my-4">
          <p>#1
by john_doe</p>
<p>1/15/24</p>
        </div>


    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
       
 </main>


 <script src="style.js"></script>
</body>
</html>
